services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ers
      POSTGRES_USER: ers
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ers_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ers -d ers"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgres://ers:${POSTGRES_PASSWORD:-ers_password}@postgres:5432/ers
      JWT_SECRET: ${JWT_SECRET:-change-me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL:-https://api.deepseek.com/v1/chat/completions}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      PADDLE_OCR_API_URL: ${PADDLE_OCR_API_URL:-}
      PADDLE_OCR_API_KEY: ${PADDLE_OCR_API_KEY:-}
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
