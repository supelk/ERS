name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================================
  # macOS 构建
  # ============================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri (macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tauriScript: 'pnpm tauri'
          distPath: '../dist'
          args: '--debug'
          release: false
          
      - name: Debug - list target directory
        if: always()
        run: |
          echo "=== looking for bundles ==="
          find src-tauri/target -name "*.dmg" -o -name "*.app" 2>/dev/null || echo "No .dmg/.app found"
          echo "=== full target tree (top 3 levels) ==="
          ls -R src-tauri/target | head -100      
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: src-tauri/target/debug/bundle/**/*

